name: Photostrip
options:
  bundleIdPrefix: nl.rogier
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  developmentLanguage: nl

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    ENABLE_BITCODE: NO

targets:
  Photobooth:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Photobooth
        excludes:
          - "Info.plist"
    info:
      path: Photobooth/Info.plist
      properties:
        NSCameraUsageDescription: "Photostrip heeft toegang tot je camera nodig om foto's te maken."
        NSPhotoLibraryAddUsageDescription: "Photostrip slaat je fotostrip automatisch op in je fotobibliotheek."
        NSPhotoLibraryUsageDescription: "Photostrip heeft toegang tot je fotobibliotheek nodig om foto's op te slaan."
        UILaunchScreen:
          UIColorName: BirthdayPink
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.rogier.photobooth
        PRODUCT_NAME: Photostrip
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: Photobooth/Info.plist
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Photos.framework

  PhotoboothTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhotoboothTests
    dependencies:
      - target: Photobooth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.rogier.photobooth.tests
        SWIFT_VERSION: "5.9"
